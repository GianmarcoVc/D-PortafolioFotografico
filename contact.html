<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no ">
    <!-- Prefetch -->
    <link rel="prefetch" href="index.html" as="document">
    <!-- Preload -->
    <link rel="preload" href="css/styles.css" type="styles">
    <link rel="stylesheet" type="text/css" href="css/styles.css">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" type="font">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg" href="img/icon/icon.svg" />
    <title>Portafolio Fotográfico | Contacto</title>
</head>
<body>
    <div class="loader"></div>
    <div id="landscape">
        <div>
            <p class="fadeInDown">
            <img src="./img/adicional/girar.png"><br>
            ¡Gira el dispositivo! <br><span>Por favor</span>
            </p>
        </div>
    </div>
    <section id="login">
        <div class="informacion">
            <a href="index.html"> <img src="img/icon/flecha.svg"> </a>
            <object id="logo" data="img/icon/fotografo.svg" type="image/svg+xml"></object>
            <h2>Contacto</h2>
            <form id="loginform">
                <label>Nombre</label>
                <input type="text" required>
                <label>Asunto</label>
                <input type="text" required>
                <label>Dirección de correo electrónico</label>
                <input type="email" required>
                <label>Teléfono</label>
                <input type="tel" required>
                <span id="aceptar">
                    <input type="checkbox" id="checkbox" required>
                    <p>Aceptar la politica de privacidad*</p>
                </span>
                <div>
                    <button type="submit">Enviar</button>
                </div>
            </form>
            <div id="terminos">
                <p>&copy;2021 GIANMARCO | All Rights Reserved</p>
                <a>Terms of Service</a>
                <a>Privacy Policy</a>
            </div>
        </div>
        <div class="imagen">
            <button>Soporte</button>
        </div>
    </section>
    <script type="text/javascript" src="js/prefixfree.min.js"></script>
</body>
</html>
